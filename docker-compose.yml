services:
  db:
    image: postgres:15-alpine
    container_name: etuni-postgres
    environment:
      POSTGRES_DB: etuni
      POSTGRES_USER: etuni
      POSTGRES_PASSWORD: etuni_password_change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etuni"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - etuni-network

  backend:
    build:
      context: ./backend
    container_name: etuni-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/etuni
      SPRING_DATASOURCE_USERNAME: etuni
      SPRING_DATASOURCE_PASSWORD: etuni_password_change_me
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      db:
        condition: service_healthy
    networks:
      - etuni-network

networks:
  etuni-network:
    driver: bridge

volumes:
  postgres_data:
