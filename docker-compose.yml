services:
  db:
    image: postgres:15-alpine
    container_name: etuni-postgres
    environment:
      POSTGRES_DB: etuni
      POSTGRES_USER: etuni
      POSTGRES_PASSWORD: etuni
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etuni"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
